version: '3.8'

services:
  # ============================================
  # n8n - Workflow Automation Engine
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: clara-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-clarapipeline}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=${TIMEZONE:-America/New_York}
      - N8N_LOG_LEVEL=info
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows
      - ./data:/home/node/data
      - ./outputs:/home/node/outputs
    networks:
      - clara-network

  # ============================================
  # Ollama - Local LLM (Optional, for AI extraction)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    container_name: clara-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - clara-network
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ============================================
  # Pipeline Runner - Python scripts
  # ============================================
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clara-pipeline
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./scripts:/app/scripts
      - ./templates:/app/templates
      - ./changelog:/app/changelog
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    depends_on:
      - ollama
    networks:
      - clara-network
    command: ["python", "scripts/batch_process.py", "--no-llm"]

volumes:
  n8n_data:
  ollama_data:

networks:
  clara-network:
    driver: bridge
